name: PSU Tender Scraper

on:
  schedule:
    - cron: '0 1 * * *'   # Roz raat 1 baje UTC = subah 6:30 IST
  workflow_dispatch:        # Manual run bhi kar sakte ho

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 supabase python-dotenv

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python psu_scraper.py